<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechNova — 登录</title>
  <meta name="description" content="TechNova科技集团登录页面">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <!-- Particle Canvas Background -->
  <canvas id="particle-canvas"></canvas>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo__icon">T</div>
        <div class="login-logo__text">TechNova</div>
      </div>
      <p class="login-subtitle">智领未来，科技赋能</p>

      <!-- Login Form -->
      <form id="login-form" class="login-form" autocomplete="off">
        <div class="login-form__group">
          <label for="login-username" class="login-form__label">用户名</label>
          <div class="login-form__input-wrap">
            <svg class="login-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="login-username" class="login-form__input" placeholder="请输入用户名" required>
          </div>
        </div>
        <div class="login-form__group">
          <label for="login-password" class="login-form__label">密码</label>
          <div class="login-form__input-wrap">
            <svg class="login-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="login-password" class="login-form__input" placeholder="请输入密码" required>
          </div>
        </div>

        <div class="login-form__options">
          <label class="login-form__remember">
            <input type="checkbox" id="login-remember">
            <span>记住密码</span>
          </label>
          <a href="#" class="login-form__forgot">忘记密码?</a>
        </div>

        <button type="submit" class="login-form__btn">
          <span class="login-form__btn-text">登 录</span>
          <span class="login-form__btn-loading" style="display:none;">
            <svg class="login-spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
          </span>
        </button>
      </form>

      <!-- Divider -->
      <div class="login-divider">
        <span>其他登录方式</span>
      </div>

      <!-- Social Login -->
      <div class="login-social">
        <button class="login-social__btn" title="微信登录">微</button>
        <button class="login-social__btn" title="企业微信登录">企</button>
        <button class="login-social__btn" title="钉钉登录">钉</button>
      </div>

      <!-- Register Link -->
      <div class="login-footer">
        还没有账号? <a href="#">立即注册</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
